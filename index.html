<body>
  <a class="retour" href="https://Gitaillot.github.io/">← Accueil</a>

    <li><span class="vide">Aucun pour l'instant.</span></li>
  </ul>

  <h2>🚧 En travaux</h2>
  <ul id="en-cours">
    <li>
      <a class="projet" href="Med_Essentiels.html">Med_Essentiels.html</a>
      <span class="desc">— Médicaments Essentiels — Pharmacologie</span>
      <span id="derniere-Med_Essentiels" class="jamais"></span>

    <li>
      <a class="projet" href="Valeurs_Usuelles.html">Valeurs_Usuelles.html</a>

      <span id="derniere-Valeurs_Usuelles" class="jamais"></span>
    </li>
    <!-- Ajoutez vos HTML ici sur ce modèle :
    <li>
      <a class="projet" href="NOM_FICHIER.html">Titre</a><br>
      <span class="desc">— Description</span>
      <span id="derniere-NOM" class="jamais"></span>
    </li>
    -->
  </ul>

  <script>
    function afficherDerniere(cle, elementId) {
      try {
        const val = localStorage.getItem(cle);
        const el = document.getElementById(elementId);
        if (!el) return;
        if (!val) { el.className = 'jamais'; el.textContent = 'jamais utilisé'; return; }
        const diffMs = Date.now() - parseInt(val);
        const m = Math.floor(diffMs / 60000);
        const h = Math.floor(diffMs / 3600000);
        const j = Math.floor(diffMs / 86400000);
        let texte;
        if (m < 1)        texte = "à l'instant";
        else if (m < 60)  texte = `il y a ${m} min`;
        else if (h < 24)  texte = `il y a ${h} h`;
        else if (j === 1) texte = 'hier';
        else if (j < 30)  texte = `il y a ${j} jours`;
        else if (j < 365) texte = `il y a ${Math.floor(j/30)} mois`;
        else              texte = `il y a ${Math.floor(j/365)} an(s)`;
        el.className = 'derniere';
        el.textContent = texte;
      } catch(e) {}
    }

    // Ajoutez une ligne par programme :
    afficherDerniere('Med_Essentiels_derniere_utilisation', 'derniere-Med_Essentiels');
    afficherDerniere('Valeurs_Usuelles_derniere_utilisation', 'derniere-Valeurs_Usuelles');
  </script>
</body>
